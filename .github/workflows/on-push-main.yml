name: Push to Main

# Run on push to main branch (after PR merge)
on:
  push:
    branches:
      - main

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Format check
        run: python -m black --check --quiet .
      
      - name: Import check
        run: python -m isort --check-only --quiet .
      
      - name: Linting
        run: python -m pylint scripts/ --disable=all --enable=E,F
        continue-on-error: true

  testing:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: quality-checks
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run all tests
        run: |
          python -m pytest tests/ -v --tb=short --junit-xml=test-results.xml
      
      - name: Test coverage (must be ≥ 80%)
        run: |
          python -m pytest tests/ --cov=scripts --cov-report=xml --cov-fail-under=80
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: testing
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check for Dockerfile
        id: dockerfile
        run: |
          if [ -f "Dockerfile" ] && [ -f "Dockerfile.platform" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Set up Docker Buildx
        if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build platform image
        if: steps.dockerfile.outputs.exists == 'true'
        run: |
          docker build -t agentic-sdlc:latest -f Dockerfile.platform .
        continue-on-error: true
      
      - name: Skip Docker build
        if: steps.dockerfile.outputs.exists == 'false'
        run: echo "ℹ️ Dockerfiles not found, skipping Docker build"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
      
      - name: Bandit security scan
        run: |
          python -m bandit -r scripts/ -f json -o bandit-report.json
          python -m bandit -r scripts/
        continue-on-error: true
      
      - name: Safety check (dependencies)
        run: |
          safety check --json > safety-report.json
        continue-on-error: true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check for README
        run: test -f README.md || (echo "Missing README.md" && exit 1)
      
      - name: Check for CHANGELOG
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "Warning: Missing CHANGELOG.md"
            exit 0
          fi
      
      - name: Validate markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: true
        continue-on-error: true

  notifications:
    name: Notifications
    runs-on: ubuntu-latest
    if: always()
    needs: [quality-checks, testing, build, security, documentation]
    
    steps:
      - name: Determine overall status
        run: |
          if [ "${{ needs.quality-checks.result }}" = "failure" ] || \
             [ "${{ needs.testing.result }}" = "failure" ] || \
             [ "${{ needs.build.result }}" = "failure" ]; then
            echo "❌ Push validation failed"
            exit 1
          else
            echo "✓ Push validation passed"
            exit 0
          fi
      
      - name: Comment on commit
        uses: actions/github-script@v6
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const payload = context.payload;
            const commit_sha = payload.after;
            const commit_message = payload.head_commit.message;
            
            let status = '✓ All checks passed';
            if (${{ needs.quality-checks.result == 'failure' || needs.testing.result == 'failure' || needs.build.result == 'failure' }}) {
              status = '❌ Some checks failed';
            }
            
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: commit_sha,
              body: `${status}\n\nSee [Actions logs](${context.server_url}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`
            });

  status:
    name: Status
    runs-on: ubuntu-latest
    if: always()
    needs: [quality-checks, testing, build, security, documentation, notifications]

    steps:
      - name: Set final workflow status
        run: |
          if [ "${{ needs.quality-checks.result }}" = "failure" ] || \
             [ "${{ needs.testing.result }}" = "failure" ] || \
             [ "${{ needs.build.result }}" = "failure" ]; then
            exit 1
          fi

          exit 0
