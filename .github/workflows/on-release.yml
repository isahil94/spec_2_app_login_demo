name: Release (On-Release Event)

# NOTE: This workflow is being consolidated with release.yml
# Recommended: Use release.yml for full release pipeline
# This workflow remains for backward compatibility and quick validation

# Run when a release is published
on:
  release:
    types: [published]

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get version
        id: version
        run: |
          VERSION=${{ github.event.release.tag_name }}
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check version consistency
        run: |
          VERSION=${{ steps.version.outputs.version }}
          
          # Check pyproject.toml
          grep -q "version = \"$VERSION\"" pyproject.toml || \
            (echo "ERROR: Version mismatch in pyproject.toml" && exit 1)
          
          # Check __init__.py if exists
          if grep -q "__version__" scripts/__init__.py 2>/dev/null; then
            grep -q "__version__ = \"$VERSION\"" scripts/__init__.py || \
              (echo "ERROR: Version mismatch in __init__.py" && exit 1)
          fi
          
          echo "✓ Version consistency verified: $VERSION"
      
      - name: Validate CHANGELOG.md
        run: |
          test -f CHANGELOG.md || (echo "ERROR: Missing CHANGELOG.md" && exit 1)
          
          VERSION=${{ steps.version.outputs.version }}
          grep -q "## \[$VERSION\]" CHANGELOG.md || \
            (echo "ERROR: Release not documented in CHANGELOG.md" && exit 1)
          
          echo "✓ CHANGELOG.md is up-to-date"
      
      - name: Validate README.md
        run: |
          test -f README.md || (echo "ERROR: Missing README.md" && exit 1)
          
          # Check for key sections
          grep -q "## Installation" README.md || echo "WARNING: Missing Installation section"
          grep -q "## Usage" README.md || echo "WARNING: Missing Usage section"
          
          echo "✓ README.md exists"
      
      - name: Run full test suite
        run: |
          python -m pytest tests/ -v --tb=short
      
      - name: Check coverage
        run: |
          python -m pytest tests/ --cov=scripts --cov-fail-under=80
      
      - name: Security audit
        run: |
          python -m pip install safety bandit
          safety check --json > /dev/null 2>&1 || echo "WARNING: Dependency vulnerabilities found"
          python -m bandit -r scripts/ -f txt
        continue-on-error: true

  build-release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: validate-release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel twine
      
      - name: Build distribution
        run: |
          python -m build
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: validate-release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: ${{ env.DOCKER_USERNAME != '' }}
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME || 'localhost' }}/app:latest
            ${{ secrets.DOCKER_USERNAME || 'localhost' }}/app:${{ github.event.release.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build platform image
        run: |
          docker build -t agentic-sdlc:${{ github.event.release.tag_name }} -f Dockerfile.platform .
        continue-on-error: true

  create-release-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    needs: validate-release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Extract release notes
        id: notes
        run: |
          VERSION=${{ github.event.release.tag_name }}
          
          # Extract from CHANGELOG
          python -c "
          import re
          with open('CHANGELOG.md', 'r') as f:
              content = f.read()
          
          # Find the section for this version
          pattern = r'## \[{}\](.*?)(?=## \[|$)'.format(re.escape('$VERSION'))
          match = re.search(pattern, content, re.DOTALL)
          if match:
              notes = match.group(1).strip()
              with open('release-notes.txt', 'w') as f:
                  f.write(notes)
          "
      
      - name: Upload release notes
        uses: actions/upload-artifact@v3
        with:
          name: release-notes
          path: release-notes.txt

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    if: always()
    needs: [build-release, build-docker, create-release-notes]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v3
      
      - name: Update release notes
        uses: actions/github-script@v6
        if: github.event.release.id
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let notes = '';
            
            try {
              notes = fs.readFileSync('release-notes/release-notes.txt', 'utf8');
            } catch (e) {
              console.log('No release notes file found');
            }
            
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              body: notes || context.payload.release.body
            });
      
      - name: Create GitHub deployment
        uses: actions/github-script@v6
        if: github.event.release.id
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.release.tag_name,
              environment: 'production',
              description: 'Release deployment',
              auto_merge: false,
              required_contexts: []
            });
      
      - name: Slack notification
        if: ${{ success() && env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✓ Release ${{ github.event.release.tag_name }} published",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Release Published*\n\n*Tag:* ${{ github.event.release.tag_name }}\n*Author:* ${{ github.event.release.author.login }}\n\n<${{ github.event.release.html_url }}|View Release>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  release_final_status:
    name: Release Status
    runs-on: ubuntu-latest
    if: always()
    needs: [validate-release, build-release, build-docker, create-release-notes, publish-release]
    
    steps:
      - run: |
          if [ "${{ needs.validate-release.result }}" = "failure" ] || \
             [ "${{ needs.build-release.result }}" = "failure" ]; then
            echo "❌ Release validation failed"
            exit 1
          else
            echo "✓ Release published successfully"
            exit 0
          fi
